<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#1b0d3a"/>
      <stop offset="70%" stop-color="#0a0518"/>
      <stop offset="100%" stop-color="#05030a"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c9a6ff"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#2a1055"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b98cff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#b98cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="24" fill="url(#halo)"/>

  <!-- almond -->
  <path d="M6 32 Q32 9 58 32 Q32 55 6 32 Z" fill="#0a0510"/>
  <path d="M9 32 Q32 12.5 55 32 Q32 51.5 9 32 Z" fill="#efe6ff"/>

  <!-- iris + pupil -->
  <circle cx="32" cy="32" r="14.5" fill="url(#iris)"/>
  <circle cx="32" cy="32" r="6.4" fill="#0a0510"/>
  <circle cx="27.6" cy="27.6" r="2.4" fill="#ffffff" opacity=".9"/>

  <!-- iris streaks -->
  <g stroke="#d8beff" stroke-width="1" stroke-opacity=".5" fill="none">
    <path d="M32 20 V25"/><path d="M32 44 V39"/><path d="M20 32 H25"/><path d="M44 32 H39"/>
    <path d="M23.5 23.5 l3.5 3.5"/><path d="M40.5 40.5 l-3.5 -3.5"/>
    <path d="M40.5 23.5 l-3.5 3.5"/><path d="M23.5 40.5 l3.5 -3.5"/>
  </g>

  <!-- glowing rim -->
  <path d="M9 32 Q32 12.5 55 32 Q32 51.5 9 32 Z" fill="none" stroke="#b98cff" stroke-width="1.4" stroke-opacity=".85"/>
</svg>
